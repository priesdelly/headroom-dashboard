server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/(health|stats|stats-history)$ {
        proxy_pass http://headroom:8787;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
