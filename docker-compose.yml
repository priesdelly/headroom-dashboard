services:
  headroom:
    build: ./docker/headroom
    command: ["--host", "0.0.0.0", "--port", "8787"]
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
        - ./data/headroom:/root/.headroom
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "8788:80"
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./etc/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      headroom:
        condition: service_healthy